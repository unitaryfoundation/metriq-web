name: Deploy Metriq

on:
  push:
    branches: [ main ]
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'metriq-pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build TypeScript
        run: npm run build:newapp

      - name: Prepare static artifact
        run: |
          rm -rf build
          mkdir -p build/data build/public
          cp index.html footer.html styles.css tour.css main.js tour.js build/
          rsync -a data/ build/data/
          rsync -a public/ build/public/
          echo metriq.info > build/CNAME
          touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
